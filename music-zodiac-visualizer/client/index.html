      border-right: none;

      box-shadow: -4px 0 24px rgba(0,0,0,0.4);
    }
    #about-panel.open { display: flex; }
    #about-panel::after {
      content: '';
      position: absolute;
      bottom: -11px;
      right: 28px;
      width: 0;
      height: 0;
      border-left: 11px solid transparent;
      border-right: 11px solid transparent;
      border-top: 12px solid #0a0a0a;
      filter: drop-shadow(0 1px 0 rgba(255,255,255,0.18));

    #about-panel::before {
      content: '';
      position: absolute;
      bottom: -12px;
      right: 27px;
      width: 0;
      height: 0;

<body>
  <div id="canvas-container"></div>

  <div id="about-overlay" aria-hidden="true"></div>
  <div id="about-panel" role="dialog" aria-labelledby="about-header-title" aria-modal="true">
    <div class="about-header">
      <h2 id="about-header-title" class="about-header-title">12.fun</h2>
      <div class="about-header-right">
        <button type="button" class="about-lang-btn" id="about-lang-btn" aria-label="Switch language">EN / 中文</button>
        <button type="button" class="about-close" id="about-close" aria-label="關閉">×</button>
      </div>
    </div>
    <div class="about-body" id="about-body"></div>
  </div>

  <div id="controls">
    <a id="link-soundcloud" class="streamline-link" href="https://soundcloud.com/gctw/huting" target="_blank" rel="noopener noreferrer" title="SoundCloud">SoundCloud</a>
    <div class="controls-center">
      <div id="timeline-wrap">
        <span id="timeline-current" aria-label="目前時間">0:00</span>
        <div id="timeline-bar-wrap">
          <div id="timeline-progress" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
        </div>
        <span id="timeline-duration" aria-label="總長度">0:00</span>
      </div>
      <select id="audio-select"><option value="">-- choose music --</option></select>
      <button id="btn-play" class="primary" title="播放" aria-label="播放">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke="currentColor"><polygon points="8,5 8,19 19,12" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="btn-pause" title="暫停" aria-label="暫停">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke="currentColor"><rect x="6" y="5" width="4" height="14" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><rect x="14" y="5" width="4" height="14" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <label class="file-label" for="audio-file-input" title="選擇本機檔案" aria-label="選擇本機檔案">
        <img id="music-thumbnail" src="" alt="" />
        <span id="music-thumbnail-placeholder">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke="currentColor"><path d="M4 4h6l2 2h8a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
      </label>
      <input type="file" id="audio-file-input" accept="audio/*" />
      <span id="local-file-name" class="local-file-name" aria-live="polite"></span>
    </div>
    <div class="controls-right">
      <button id="btn-about" type="button" title="About" aria-label="About">about</button>
      <a id="link-ifunlove" class="streamline-link" href="https://ifunlove.com/" target="_blank" rel="noopener noreferrer" title="ifunlove">ifunlove</a>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
  <script src="https://unpkg.com/jsmediatags@3.9.5/dist/jsmediatags.min.js"></script>
  <script src="visualEngine.js"></script>
  <script src="zodiac/RatSystem.js"></script>
  <script src="zodiac/OxSystem.js"></script>
  <script src="zodiac/TigerSystem.js"></script>
  <script src="zodiac/RabbitSystem.js"></script>
  <script src="zodiac/DragonSystem.js"></script>
  <script src="zodiac/SnakeSystem.js"></script>
  <script src="zodiac/HorseSystem.js"></script>
  <script src="zodiac/GoatSystem.js"></script>
  <script src="zodiac/MonkeySystem.js"></script>
  <script src="zodiac/RoosterSystem.js"></script>
  <script src="zodiac/DogSystem.js"></script>
  <script src="zodiac/PigSystem.js"></script>
  <script src="sketch.js"></script>
  <script>
    (function () {
      var btn = document.getElementById('btn-about');
      var panel = document.getElementById('about-panel');
      var overlay = document.getElementById('about-overlay');
      var closeBtn = document.getElementById('about-close');
      var langBtn = document.getElementById('about-lang-btn');
      var bodyEl = document.getElementById('about-body');
      var headerTitleEl = document.getElementById('about-header-title');
      var aboutData = null;
      var currentLang = 'en';

      function openAbout() {
        panel.classList.add('open');
        overlay.classList.add('open');
        overlay.setAttribute('aria-hidden', 'false');
      }
      function closeAbout() {
        panel.classList.remove('open');
        overlay.classList.remove('open');
        overlay.setAttribute('aria-hidden', 'true');
      }

      function renderAbout(lang) {
        if (!aboutData || !aboutData[lang]) return;
        var d = aboutData[lang];
        if (headerTitleEl) headerTitleEl.textContent = d.title;
        var html = '';
        (d.intro || []).forEach(function (p) { html += '<p>' + escapeHtml(p) + '</p>'; });
        html += '<h2>' + escapeHtml(d.zodiacHeading) + '</h2><ul>';
        (d.zodiacItems || []).forEach(function (item) {
          html += '<li><strong>' + escapeHtml(item.name) + '</strong> — ' + escapeHtml(item.desc) + '</li>';
        });
        html += '</ul><p><strong>' + escapeHtml(d.usersCanHeading) + '</strong></p><ul>';
        (d.usersCanItems || []).forEach(function (item) { html += '<li>' + escapeHtml(item) + '</li>'; });
        html += '</ul><p>' + escapeHtml(d.exploration) + '</p>';
        html += '<h2>' + escapeHtml(d.aboutCreatorHeading) + '</h2>';
        (d.aboutCreatorIntro || []).forEach(function (p) { html += '<p>' + escapeHtml(p) + '</p>'; });
        html += '<p>' + escapeHtml(d.genresLabel) + '</p><ul>';
        (d.genres || []).forEach(function (g) { html += '<li>' + escapeHtml(g) + '</li>'; });
        html += '</ul><p>' + escapeHtml(d.aboutCreatorClosing) + '</p>';
        bodyEl.innerHTML = html;
      }
      function escapeHtml(s) {
        if (s == null) return '';
        var div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      function setLang(lang) {
        currentLang = lang;
        if (langBtn) langBtn.textContent = lang === 'en' ? 'EN / 中文' : 'EN / 中文';
        renderAbout(lang);
      }

      function toggleLang() {
        currentLang = currentLang === 'en' ? 'zh' : 'en';
        renderAbout(currentLang);
      }

      if (btn) btn.addEventListener('click', openAbout);
      if (closeBtn) closeBtn.addEventListener('click', closeAbout);
      if (overlay) overlay.addEventListener('click', closeAbout);
      if (langBtn) langBtn.addEventListener('click', toggleLang);

      fetch('about-lang.json')
        .then(function (r) { return r.json(); })
        .then(function (data) {
          aboutData = data;
          setLang('en');
        })
        .catch(function () {
          bodyEl.innerHTML = '<p>Unable to load content.</p>';
        });
    })();
  </script>
</body>
