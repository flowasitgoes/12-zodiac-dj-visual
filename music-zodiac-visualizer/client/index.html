<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>12 Zodiac Music Visualizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
    #canvas-container {
      position: absolute;
      left: 0;
      top: 0;
      width: 60vw;
      height: 100%;
    }
    #controls {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: rgba(0,0,0,0.7);
      border-radius: 12px;
    }
    #controls button {
      padding: 8px 14px;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: transparent;
      color: #eee;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    #controls button:hover { background: rgba(255,255,255,0.1); }
    #controls button.primary { background: transparent; color: #fff; }
    #controls button.primary:hover { background: rgba(26, 127, 55, 0.3); }
    #controls button svg,
    #controls .file-label svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    #controls #btn-play svg { stroke: #22c55e; }
    #controls #btn-pause svg { stroke: #d1d5db; }
    #controls .file-label svg { stroke: #3b82f6; }
    #controls select {
      padding: 6px 10px;
      border-radius: 6px;
      background: #222;
      color: #eee;
      border: 1px solid #444;
    }
    #controls input[type="file"] {
      display: none;
    }
    #controls .file-label {
      padding: 8px 14px;
      font-size: 14px;
      border-radius: 8px;
      cursor: pointer;
      background: transparent;
      color: #eee;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    #controls .file-label:hover { background: rgba(59, 130, 246, 0.25); }
    #controls .file-label #music-thumbnail,
    #controls .file-label #music-thumbnail-placeholder {
      width: 22px;
      height: 22px;
      border-radius: 4px;
    }
    #controls .file-label #music-thumbnail-placeholder svg {
      width: 22px;
      height: 22px;
      display: block;
    }
    #controls .file-label #music-thumbnail {
      object-fit: cover;
      display: none;
    }
    #controls .file-label #music-thumbnail.show { display: block; }
    #controls .file-label #music-thumbnail-placeholder { display: block; }
    #controls .file-label #music-thumbnail-placeholder.hide { display: none; }
    #controls .local-file-name {
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
      color: #aaa;
    }
    #timeline-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 200px;
    }
    #timeline-current, #timeline-duration {
      font-variant-numeric: tabular-nums;
      font-size: 12px;
      color: #9ca3af;
      min-width: 2.2em;
    }
    #timeline-bar-wrap {
      flex: 1;
      height: 6px;
      border: 1px solid #4b5563;
      border-radius: 3px;
      background: transparent;
      overflow: hidden;
    }
    #timeline-progress {
      height: 100%;
      width: 0%;
      border-radius: 2px;
      background: transparent;
      border-right: 2px solid #22c55e;
      box-sizing: border-box;
      transition: width 0.15s linear;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="controls">
    <div id="timeline-wrap">
      <span id="timeline-current" aria-label="目前時間">0:00</span>
      <div id="timeline-bar-wrap">
        <div id="timeline-progress" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
      </div>
      <span id="timeline-duration" aria-label="總長度">0:00</span>
    </div>
    <select id="audio-select"><option value="">-- choose music --</option></select>
    <button id="btn-play" class="primary" title="播放" aria-label="播放">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke="currentColor"><polygon points="8,5 8,19 19,12" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button id="btn-pause" title="暫停" aria-label="暫停">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke="currentColor"><rect x="6" y="5" width="4" height="14" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><rect x="14" y="5" width="4" height="14" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <label class="file-label" for="audio-file-input" title="選擇本機檔案" aria-label="選擇本機檔案">
      <img id="music-thumbnail" src="" alt="" />
      <span id="music-thumbnail-placeholder">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke="currentColor"><path d="M4 4h6l2 2h8a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
    </label>
    <input type="file" id="audio-file-input" accept="audio/*" />
    <span id="local-file-name" class="local-file-name" aria-live="polite"></span>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
  <script src="https://unpkg.com/jsmediatags@3.9.5/dist/jsmediatags.min.js"></script>
  <script src="visualEngine.js"></script>
  <script src="zodiac/RatSystem.js"></script>
  <script src="zodiac/OxSystem.js"></script>
  <script src="zodiac/TigerSystem.js"></script>
  <script src="zodiac/RabbitSystem.js"></script>
  <script src="zodiac/DragonSystem.js"></script>
  <script src="zodiac/SnakeSystem.js"></script>
  <script src="zodiac/HorseSystem.js"></script>
  <script src="zodiac/GoatSystem.js"></script>
  <script src="zodiac/MonkeySystem.js"></script>
  <script src="zodiac/RoosterSystem.js"></script>
  <script src="zodiac/DogSystem.js"></script>
  <script src="zodiac/PigSystem.js"></script>
  <script src="sketch.js"></script>
</body>
</html>
